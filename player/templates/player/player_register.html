{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow dark:bg-gray-800 mt-8">
    <h2 class="text-2xl font-bold mb-4 dark:text-white text-center">Registro de Jugador</h2>
    <p class="text-gray-600 dark:text-gray-300 text-center mb-6">
        Has sido invitado a unirte a <strong>{{ invitation.team.name }}</strong>.<br>
        Completa el formulario para acceder a la plataforma.
    </p>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div class="pt-4">
            <button type="submit" class="text-white bg-green-700 hover:bg-green-800 focus:ring-4 focus:outline-none focus:ring-green-300 font-medium rounded-lg text-sm w-full py-2.5 text-center dark:bg-green-600 dark:hover:bg-green-700 dark:focus:ring-green-800">
                Completar Registro
            </button>
        </div>
    </form>
</div>
{% endblock %}
